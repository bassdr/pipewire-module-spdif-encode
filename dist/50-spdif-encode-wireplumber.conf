# WirePlumber config for pipewire-module-spdif-encode
#
# Loads a script that automatically discovers the encoder's target device
# (from target.object on the spdif-encode-output node) and locks its
# route volume to 100%.  Any volume scaling corrupts the IEC 61937
# encoded bitstream.
#
# No manual configuration needed — the target device is detected at runtime.
#
# Install to: /usr/share/wireplumber/wireplumber.conf.d/50-spdif-encode-wireplumber.conf

wireplumber.components = [
    {
        name = spdif-encode/spdif-encode-lock-volume.lua
        type = script/lua
        provides = hooks.spdif-encode.volume-lock
    }
]

wireplumber.components.rules = [
    {
        matches = [
            {
                provides = "hooks.device.routes.select"
            }
        ]
        actions = {
            merge = {
                wants = [ hooks.spdif-encode.volume-lock ]
            }
        }
    }
]
