# PipeWire module: S/PDIF surround encoder (AC3/DTS over IEC 61937)
#
# Creates a virtual 5.1 sink that encodes to AC3 or DTS in real-time and
# outputs IEC 61937-framed stereo S16LE to a hardware S/PDIF, TOSLINK,
# or HDMI device.
#
# To enable: symlink this file into /etc/pipewire/pipewire.conf.d/
#   ln -s /usr/share/pipewire/pipewire.conf.avail/50-spdif-encode.conf \
#         /etc/pipewire/pipewire.conf.d/50-spdif-encode.conf
#
# Then restart PipeWire. The virtual sink appears in pavucontrol / wpctl.
#
# Module arguments:
#   codec          ac3 or dts (default: ac3)
#   bitrate        encoder bitrate in bps (default: 448000 for ac3)
#   target.object  ALSA device name for the S/PDIF or HDMI output,
#                  e.g. "alsa_output.pci-0000_00_1f.3.iec958-stereo"
#                  Leave empty to use the default IEC958 device.

context.modules = [
    {   name = libpipewire-module-spdif-encode
        args = {
            #codec          = ac3
            #bitrate        = 448000
            #target.object  = ""
        }
    }
]
